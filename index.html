
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>GT Nguyen - Portfolio</title>

      <script>
  // Restore deep-link path after the 404.html redirect
  (function () {
    var params = new URLSearchParams(window.location.search);
    var redirect = params.get("redirect");

    if (redirect) {
      // Remove the redirect query param and replace URL with the original path
      window.history.replaceState(null, "", redirect);
    }
  })();
</script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
